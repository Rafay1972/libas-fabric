<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | لباسِ ہدایہ</title>
    <link rel="canonical" href="https://rafay1972.github.io/libas-fabric/product.html">
    <style>
        :root { --bg: #0d0d0d; --bg2: #1a1a1a; --card: #252525; --gold: #c9a961; --text: #f0f0f0; --text2: #bbb; --border: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: var(--bg2); padding: 30px; border-radius: 12px; border: 1px solid var(--border); }
        h1 { color: #fff; margin-bottom: 10px; }
        .category { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-size: 12px; }
        .price { font-size: 24px; font-weight: 800; color: var(--gold); margin: 15px 0; }
        .desc { color: #ccc; margin: 15px 0; line-height: 1.6; }
        .gallery { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .gallery img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 2px solid var(--border); }
        .btn { background: var(--gold); color: #000; padding: 12px 25px; border-radius: 30px; font-weight: 700; text-decoration: none; display: inline-block; margin-top: 10px; }
        .btn:hover { background: #fff; }
        .related { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 15px; margin-top: 20px; }
        .related-card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); text-decoration: none; color: #fff; }
        .related-card img { width: 100%; height: 120px; object-fit: cover; }
        .related-card .info { padding: 10px; font-size: 13px; }
        .related-card .price { color: var(--gold); font-weight: 700; }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="container" id="productContent">
    <p style="color:#888;">Loading product...</p>
</div>

<script>
    // Firebase Config – apni values daalein
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function getCategoryImageUrl(cat) {
        const base = 'https://source.unsplash.com/400x400/?';
        const map = { Lawn:'lawn,fabric', Khaddar:'khaddar,wool', Cotton:'cotton,fabric', Silk:'silk,satin', Chiffon:'chiffon,dress', Linen:'linen,textile', Jamawar:'jamawar,shawl', Karandi:'karandi,textile', 'Wash & Wear':'wash,wear,fabric', Boski:'boski,silk', Other:'fabric,textile' };
        return base + (map[cat] || 'fabric,textile');
    }

    async function loadProduct() {
        const params = new URLSearchParams(window.location.search);
        const id = Number(params.get('id'));
        if (!id) {
            document.getElementById('productContent').innerHTML = '<h1>Product not found</h1>';
            return;
        }
        const snap = await database.ref('products').once('value');
        const products = snap.val() || [];
        const product = products.find(p => p.id === id);
        if (!product) {
            document.getElementById('productContent').innerHTML = '<h1>Product not found</h1>';
            return;
        }
        document.title = product.name + ' | لباسِ ہدایہ';
        const imageSrc = (product.images && product.images.length>0) ? product.images[0] : getCategoryImageUrl(product.category);
        let galleryHtml = '';
        if (product.images && product.images.length>0) {
            product.images.forEach(img => galleryHtml += `<img src="${img}" alt="image">`);
        } else {
            galleryHtml = `<img src="${getCategoryImageUrl(product.category)}" alt="category">`;
        }
        const related = products.filter(p => p.category === product.category && p.id !== product.id);
        let relatedHtml = related.map(rp => {
            const img = (rp.images && rp.images.length>0) ? rp.images[0] : getCategoryImageUrl(rp.category);
            return `<a class="related-card" href="product.html?id=${rp.id}">
                <img src="${img}" alt="${rp.name}">
                <div class="info"><strong>${rp.name}</strong><div class="price">Rs. ${rp.price.toLocaleString()}</div></div>
            </a>`;
        }).join('');
        document.getElementById('productContent').innerHTML = `
            <h1>${product.name}</h1>
            <div class="category">${product.category}</div>
            <div class="gallery">${galleryHtml}</div>
            <div class="price">Rs. ${product.price.toLocaleString()} ${product.oldPrice && product.oldPrice>product.price ? `<span style="text-decoration:line-through;color:#777;font-size:16px;">Rs. ${product.oldPrice.toLocaleString()}</span>` : ''}</div>
            <div class="desc">${product.desc || 'No description'}</div>
            <a href="tel:03194327821" class="btn">📞 Order Now</a>
            <a href="https://wa.me/923194327821?text=I%20want%20to%20order%20${encodeURIComponent(product.name)}" class="btn" style="background:#25d366; color:#fff; margin-left:10px;">💬 WhatsApp</a>
            <h3 style="color:#fff; margin-top:25px;">Related Products in ${product.category}</h3>
            <div class="related">${relatedHtml}</div>
        `;
    }
    loadProduct();
</script>
</body>
</html>
