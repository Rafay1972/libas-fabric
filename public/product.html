<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | لباسِ ہدایہ</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect width='200' height='200' rx='30' fill='%230d0d0d' stroke='%23c9a961' stroke-width='6'/%3E%3Ctext x='100' y='115' font-family='Scheherazade New,Amiri,Arial,sans-serif' font-size='68' font-weight='bold' fill='%23c9a961' text-anchor='middle' dominant-baseline='middle'%3E%D9%84%D8%A8%D8%A7%D8%B3%D9%90%20%DB%81%D8%AF%D8%A7%DB%8C%DB%81%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .product-layout { display: flex; gap: 30px; flex-wrap: wrap; margin-top: 20px; }
        .gallery-col { flex: 1 1 480px; min-width: 300px; }
        .main-image { width: 100%; aspect-ratio: 1 / 1; border-radius: 12px; border: 2px solid var(--border); object-fit: cover; cursor: pointer; background: #111; }
        .thumbnail-strip { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .thumbnail-strip img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 2px solid var(--border); cursor: pointer; transition: 0.2s; opacity: 0.7; }
        .thumbnail-strip img:hover, .thumbnail-strip img.active { border-color: var(--gold); opacity: 1; }
        .info-col { flex: 1 1 360px; min-width: 280px; background: var(--bg2); padding: 25px; border-radius: 16px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; position:relative;}
        .info-col .category { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-size: 12px; }
        .info-col h1 { font-size: 28px; color: #fff; margin: 0; line-height:1.2; }
        .info-col .price { font-size: 30px; font-weight: 800; color: var(--gold); }
        .info-col .price .old-price { font-size: 16px; color: #777; text-decoration: line-through; margin-left: 10px; font-weight: 400; }
        .info-col .desc { color: #ccc; line-height: 1.7; font-size: 14px; margin-bottom:15px; }
        
        .qty-row { display:flex; align-items:center; gap:15px; margin-bottom:10px;}
        .qty-control { display:flex; align-items:center; border:1px solid var(--border); border-radius:8px; overflow:hidden;}
        .qty-btn { background:var(--bg3); color:#fff; border:none; width:40px; height:40px; cursor:pointer; font-size:18px; transition:0.2s; display:flex; align-items:center; justify-content:center;}
        .qty-btn:hover { background:var(--gold); color:#000; }
        .qty-input { width:50px; height:40px; background:var(--bg2); border:none; border-left:1px solid var(--border); border-right:1px solid var(--border); color:#fff; text-align:center; font-size:16px; }
        .qty-input:focus { outline:none; }

        .btn-row { display: flex; gap: 12px; flex-direction:column; }
        .btn-large { padding: 16px; border-radius: 8px; font-weight: 700; font-size: 15px; text-decoration: none; text-align: center; transition: 0.3s; cursor: pointer; border: none; display:flex; align-items:center; justify-content:center; gap:10px; width:100%;}
        
        .btn-cart { background: transparent; color: var(--gold); border:2px solid var(--gold); }
        .btn-cart:hover { background: var(--gold); color:#000; }
        .btn-wa { background: #25d366; color: #fff; }
        .btn-wa:hover { background: #1ebe5b; transform:scale(1.02); }
        
        .wishlist-icon { position:absolute; top:25px; right:25px; font-size:24px; color:var(--text2); cursor:pointer; transition:0.2s;}
        .wishlist-icon:hover { color:var(--gold); }
        .wishlist-icon.active { color:#c0392b; }

        @media (max-width: 768px) { .product-layout { flex-direction: column; } .main-image { aspect-ratio: 4/3; } }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo-wrapper">
            <div class="logo-badge" title="لباسِ ہدایہ">LH</div>
            <div class="logo-text">
                <div class="logo"><span class="arabic">لباسِ ہدایہ</span></div>
                <span class="subtitle">Premium Textiles</span>
            </div>
        </a>
        <div class="header-actions">
            <a href="/cart.html" style="color:inherit; text-decoration:none;">
                <div class="action-icon" title="Cart">
                    <svg class="svg-icon" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                    <span class="badge" id="cartCount">0</span>
                </div>
            </a>
        </div>
    </header>

    <div class="container" id="productContent">
        <p style="color:#888; text-align:center; padding:50px;">Loading product details...</p>
    </div>

    <script src="/js/icons.js"></script>
    <script>
        // Shared cart logic for badges
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');

        function updateBadges() {
            const badge = document.getElementById('cartCount');
            if(badge) {
                const count = cart.reduce((acc, item) => acc + item.quantity, 0);
                badge.textContent = count;
                badge.style.display = count > 0 ? 'flex' : 'none';
            }
        }
        updateBadges();

        async function loadProduct() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                document.getElementById('productContent').innerHTML = '<h1 style="color:#fff;">Product not found</h1><a href="/" style="color:#c9a961;">Return to Home</a>';
                return;
            }

            try {
                const res = await fetch('/api/products/' + id);
                const data = await res.json();

                if (!data.success || !data.product) {
                    document.getElementById('productContent').innerHTML = '<h1 style="color:#fff;">Product not found</h1><a href="/" style="color:#c9a961;">Return to Home</a>';
                    return;
                }

                const p = data.product;
                document.title = `${p.name} | لباسِ ہدایہ`;

                const imgs = (p.images && p.images.length > 0) ? p.images : ['https://placehold.co/400x400/222/888?text=Fabric'];
                const mainImg = imgs[0];
                const isWishlisted = wishlist.includes(p._id);

                let thumbnailsHtml = '';
                if(imgs.length > 1) {
                    thumbnailsHtml = `
                        <div class="thumbnail-strip" id="thumbnailStrip">
                            ${imgs.map((img, i) => `<img src="${img}" alt="thumb" class="${i===0?'active':''}" onclick="setMainImage(this, '${img}')">`).join('')}
                        </div>
                    `;
                }

                document.getElementById('productContent').innerHTML = `
                    <a href="/" style="color:var(--gold); text-decoration:none; display:inline-block; margin-bottom:20px;">&larr; Back to Shop</a>
                    
                    <div class="product-layout">
                        <div class="gallery-col">
                            <img id="mainImage" class="main-image" src="${mainImg}" alt="${p.name}" onclick="window.open(this.src)">
                            ${thumbnailsHtml}
                        </div>
                        
                        <div class="info-col">
                            <div class="wishlist-icon ${isWishlisted ? 'active' : ''}" onclick="toggleWishlist('${p._id}', this)">
                                ${isWishlisted ? SVG_ICONS.heart_filled : SVG_ICONS.heart_outline}
                            </div>
                            
                            <div class="category">${p.category}</div>
                            <h1>${p.name}</h1>
                            
                            <div class="price">
                                Rs. ${p.price.toLocaleString()}
                                ${p.oldPrice && p.oldPrice > p.price ? `<span class="old-price">Rs. ${p.oldPrice.toLocaleString()}</span>` : ''}
                            </div>
                            
                            <div class="desc">${p.description || 'Premium quality fabric from لباسِ ہدایہ. Available for immediate delivery across Pakistan.'}</div>
                            
                            <div class="qty-row">
                                <span style="color:#ccc;">Quantity:</span>
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="updateQty(-1)">${SVG_ICONS.minus}</button>
                                    <input type="number" id="qtyInput" class="qty-input" value="1" min="1" max="10" readonly>
                                    <button class="qty-btn" onclick="updateQty(1)">${SVG_ICONS.plus}</button>
                                </div>
                            </div>
                            
                            <div class="btn-row">
                                <button class="btn-large btn-cart" onclick="addToCartPage('${p._id}')">
                                    ${SVG_ICONS.cart} Add to Cart
                                </button>
                                <button class="btn-large btn-wa" onclick="orderWa('${p.name}', ${p.price})">
                                    ${SVG_ICONS.whatsapp} Order via WhatsApp
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('productContent').innerHTML = '<p style="color:#e74c3c;">Failed to load product details.</p>';
            }
        }

        window.setMainImage = function(thumbEl, src) {
            document.getElementById('mainImage').src = src;
            document.querySelectorAll('.thumbnail-strip img').forEach(el => el.classList.remove('active'));
            thumbEl.classList.add('active');
        };

        window.updateQty = function(change) {
            const input = document.getElementById('qtyInput');
            let val = parseInt(input.value) + change;
            if(val < 1) val = 1;
            if(val > 10) val = 10;
            input.value = val;
        };

        window.addToCartPage = function(id) {
            const qty = parseInt(document.getElementById('qtyInput').value) || 1;
            const existing = cart.find(i => i.product === id);
            if(existing) {
                existing.quantity += qty;
            } else {
                cart.push({ product: id, quantity: qty });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateBadges();
            alert('Added to cart!');
        };

        window.toggleWishlist = function(id, btnEl) {
            const idx = wishlist.indexOf(id);
            if(idx > -1) {
                wishlist.splice(idx, 1);
                btnEl.classList.remove('active');
                btnEl.innerHTML = SVG_ICONS.heart_outline;
            } else {
                wishlist.push(id);
                btnEl.classList.add('active');
                btnEl.innerHTML = SVG_ICONS.heart_filled;
            }
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
        };

        window.orderWa = function(name, price) {
            const qty = parseInt(document.getElementById('qtyInput').value) || 1;
            const total = price * qty;
            const msg = `Assalam-o-Alaikum! I want to order:\n\n${name}\nQuantity: ${qty}\nTotal: Rs. ${total.toLocaleString()}`;
            window.open(`https://wa.me/923194327821?text=${encodeURIComponent(msg)}`, '_blank');
        };

        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
</body>
</html>
